name: CI Safe Install

on:
  pull_request:
    paths:
      - 'tdf-hq/**'
      - 'tdf-hq-ui/**'
      - 'tdf-mobile'
      - 'tdf-mobile/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.npmrc'
      - '.github/workflows/**'
  push:
    branches: [ main ]
    paths:
      - 'tdf-hq/**'
      - 'tdf-hq-ui/**'
      - 'tdf-mobile'
      - 'tdf-mobile/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.npmrc'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
      NPM_CONFIG_IGNORE_SCRIPTS: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Clean install
        run: npm ci
      - name: npm audit
        run: npm audit --omit=dev
      - name: Build (if present)
        run: npm run -s build || echo "no build script; skipping"
      - name: Test (if present)
        run: npm test -s || echo "no test script; skipping"
