name: CI

on:
  pull_request:
    paths:
      - 'tdf-hq/**'
      - 'tdf-hq-ui/**'
      - 'tdf-mobile/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.npmrc'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      REQUIRE_MOBILE_WORKSPACE: '1'
      REQUIRE_STACK: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        run: npm --prefix tdf-mobile ci

      - name: Install Stack
        run: |
          sudo apt-get update
          sudo apt-get install -y haskell-stack

      - name: Run quality gate
        run: npm run quality

  api-contracts:
    runs-on: ubuntu-latest
    env:
      REQUIRE_MOBILE_WORKSPACE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        run: npm --prefix tdf-mobile ci

      - name: Regenerate shared API clients
        run: npm run generate:api

      - name: Verify generated clients are committed
        run: git diff --exit-code -- tdf-hq-ui/src/api/generated/types.ts tdf-mobile/src/api/generated/types.ts
